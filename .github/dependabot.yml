version: 2

pull-request-branch-name:
  separator: "-"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "bot:dependabot"
      - "github-actions"
      - "supply-chain"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions-safe:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
      - "bot:dependabot"
      - "python"
      - "supply-chain"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-safe:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/rust_core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 6
    labels:
      - "dependencies"
      - "bot:dependabot"
      - "rust"
      - "supply-chain"
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-safe:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      cargo-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 6
    labels:
      - "dependencies"
      - "bot:dependabot"
      - "npm"
      - "supply-chain"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-safe:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"
