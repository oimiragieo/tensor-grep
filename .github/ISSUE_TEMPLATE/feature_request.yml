name: Feature request
description: Propose a capability or behavior change.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for public product or engineering requests. Do not include private code, secrets, or security vulnerability details.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI/search
        - Install/upgrade/launcher
        - Rust native core
        - Python package
        - AST/structural search
        - Agent/context capsule
        - GPU/benchmarking
        - Docs
        - CI/release
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want, not just the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable behavior would make this done?
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This request does not contain an undisclosed vulnerability, exploit, secret, credential, or private token.
          required: true
