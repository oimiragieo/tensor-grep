name: Security Audit

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: Dependency & License Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit and cargo-deny
        # --locked is load-bearing: an unpinned `cargo install` resolves NEWEST transitive deps, and
        # cargo-audit 0.22.2 then fails to compile (2026-06-27); --locked uses its vetted Cargo.lock,
        # which builds. We must stay on 0.22.x (not downgrade) because the RustSec advisory DB now
        # ships CVSS 4.0 entries that older cargo-audit cannot parse ("unsupported CVSS version: 4.0").
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --locked

      - name: Run cargo audit
        working-directory: rust_core
        # pyo3 was bumped to 0.29 (pyo3-arrow 0.19 + arrow 59 + numpy 0.29), clearing
        # RUSTSEC-2026-0176/0177; the gate now runs with no ignores.
        run: cargo audit

      - name: Run cargo deny
        working-directory: rust_core
        run: cargo deny check

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Setup Python
        run: uv python install 3.12

      - name: Export Python audit requirements
        run: uv export --format requirements.txt --all-extras --no-emit-project --output-file "$RUNNER_TEMP/python-audit-requirements.txt" --locked > /dev/null

      - name: Run pip-audit
        run: |
          # Keep the gate strict for fixable findings. The ignored IDs below are
          # upstream no-fixed-version advisories in optional ML/GPU dependencies;
          # remove each ignore as soon as pip-audit reports a fixed release.
          # NOTE: pip-audit matches --ignore-vuln on the id it REPORTS, which can switch
          # between a vuln's aliases across data-source/version updates. List both the
          # PYSEC and CVE aliases for the same advisory when that happens (e.g. torch
          # PYSEC-2025-194 is now reported as CVE-2025-3000).
          uv run --no-project --python 3.12 --with pip-audit -- pip-audit \
            --require-hashes \
            --disable-pip \
            --progress-spinner off \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln CVE-2025-3000 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2025-211 \
            --ignore-vuln PYSEC-2025-212 \
            --ignore-vuln PYSEC-2025-213 \
            --ignore-vuln PYSEC-2025-214 \
            --ignore-vuln PYSEC-2025-215 \
            --ignore-vuln PYSEC-2025-216 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2025-218 \
            --ignore-vuln PYSEC-2026-139 \
            -r "$RUNNER_TEMP/python-audit-requirements.txt"

  report-audit-status:
    name: report-audit-status
    if: always() && github.event_name == 'schedule'
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update scheduled audit issue on failure
        if: needs.audit.result != 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            try {
            const title = "[Security Audit] Scheduled dependency audit failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "A scheduled dependency audit run failed.",
              "",
              `- Workflow: \`${context.workflow}\``,
              `- Run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              `- Ref: \`${context.ref}\``,
              `- Audit result: \`${{ needs.audit.result }}\``,
              "",
              "This issue is managed automatically by `.github/workflows/audit.yml`.",
              "",
              "Immediate response:",
              "1. Inspect the linked run for `cargo audit`, `cargo deny check`, and `pip-audit` output.",
              "2. Merge or prepare the required dependency update.",
              "3. Confirm the next successful scheduled audit closes this issue automatically."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Scheduled audit failed again: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["dependencies", "supply-chain"],
              });
            }
            } catch (error) {
              // Issue bookkeeping is best-effort: a transient GitHub API error (e.g. a 503)
              // must not red the scheduled audit and mask a real cargo/pip-audit failure.
              // The `audit` gate job is authoritative; surface this as a visible warning.
              core.warning(`Scheduled-audit issue bookkeeping failed (non-fatal; audit gate result is authoritative): ${error.message}`);
            }

      - name: Close scheduled audit issue on success
        if: needs.audit.result == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            try {
            const title = "[Security Audit] Scheduled dependency audit failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Closing automatically after successful scheduled audit run: ${runUrl}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: "closed",
            });
            } catch (error) {
              // Best-effort issue bookkeeping: a transient GitHub API error must not red a
              // scheduled audit whose gate job (cargo/pip-audit) already succeeded.
              core.warning(`Scheduled-audit issue bookkeeping failed (non-fatal; audit passed): ${error.message}`);
            }
