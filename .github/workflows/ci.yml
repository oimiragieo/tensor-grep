name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  release-readiness:
    name: release-readiness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Validate release/package asset consistency
        run: uv run python scripts/validate_release_assets.py

  package-manager-readiness:
    name: package-manager-readiness (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate Homebrew formula syntax
        if: runner.os == 'Linux'
        run: ruby -c scripts/tensor-grep.rb

      - name: Validate winget manifest syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Warning "winget not found; falling back to python validator"
            uv python install 3.12
            uv run python scripts/validate_release_assets.py
            exit 0
          }

          $wingetHelp = winget --help
          if ($wingetHelp -notmatch "validate") {
            Write-Warning "winget validate is unavailable in this runner version; falling back to python validator"
            uv python install 3.12
            uv run python scripts/validate_release_assets.py
            exit 0
          }

          winget validate --manifest scripts\oimiragieo.tensor-grep.yaml
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "winget validate failed with exit code $LASTEXITCODE; falling back to python validator"
            uv python install 3.12
            uv run python scripts/validate_release_assets.py
          }

  static-analysis:
    name: Formatting & Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Repo Hygiene Guard
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '(^|/)(__pycache__/|.*\.pyc$|.*\.pyd$|artifacts/|src/tensor_grep/core/profile_stats$)' || true)"
          if [ -n "$forbidden" ]; then
            echo "Tracked generated artifacts detected:"
            echo "$forbidden"
            exit 1
          fi
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Check Rust Formatting
        working-directory: rust_core
        run: cargo fmt -- --check
        
      - name: Check Rust Clippy
        working-directory: rust_core
        run: cargo clippy -- -D warnings
        
      - name: Install Python Dev Dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
        
      - name: Python Ruff Linter
        run: uv run ruff check .
        
      - name: Python Ruff Formatter
        run: uv run ruff format --check --preview .
        
      - name: Python Mypy Typecheck
        run: uv run mypy src/tensor_grep

  test-python:
    name: test-python (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Setup Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
        
      - name: Install Rust dependencies (for PyO3 fallback)
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev,ast]"
          
      - name: Run Pytest
        run: uv run pytest tests -v --tb=short

  test-rust-core:
    name: test-rust-core (${{ matrix.os }}, ${{ matrix.rust_channel }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust_channel: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust ${{ matrix.rust_channel }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_channel }}
          
      - name: Setup Python for PyO3 Linker
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Create venv for PyO3
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE\.venv\Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi
        shell: bash
          
      - name: Cargo Test
        working-directory: rust_core
        run: cargo test --verbose --no-default-features

  test-gpu-linux:
    name: test-gpu-nvidia (ubuntu-latest, cuDF)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Setup Python
        run: uv python install 3.12
        
      - name: Install Rust dependencies (for PyO3 fallback)
        uses: dtolnay/rust-toolchain@stable
        
      - name: Verify cuDF / RAPIDS Configuration
        run: |
          uv venv --python 3.12
          uv pip install cudf-cu12 kvikio-cu12 --extra-index-url https://pypi.nvidia.com
          uv pip install -e ".[dev,nlp,ast]"
          
      # Since standard GitHub Action runners don't have physical GPUs,
      # we run pytest but rely on our test suites dynamic `@pytest.mark.skipif`
      # to successfully parse the fallback architecture cleanly without crashing.
      - name: Run Pytest with GPU Hooks
        run: uv run pytest tests -v -m "not slow"

  benchmark-regression:
    name: benchmark-regression (ubuntu-latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install benchmark dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Run core benchmark suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          uv run python benchmarks/run_benchmarks.py | tee artifacts/bench_run_benchmarks.txt

      - name: Enforce benchmark regression gate
        run: |
          uv run python benchmarks/check_regression.py \
            --baseline benchmarks/baselines/run_benchmarks.ubuntu.json \
            --current artifacts/bench_run_benchmarks.json \
            --max-regression-pct 15.0 \
            --min-baseline-time-s 0.2

      - name: Build benchmark markdown summary
        run: |
          uv run python benchmarks/summarize_benchmarks.py \
            --baseline benchmarks/baselines/run_benchmarks.ubuntu.json \
            --current artifacts/bench_run_benchmarks.json \
            --max-regression-pct 15.0 \
            --min-baseline-time-s 0.2 \
            --output artifacts/benchmark_summary.md
          cat artifacts/benchmark_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts-ci
          path: artifacts/

  release:
    name: Semantic Release
    needs: [release-readiness, package-manager-readiness, static-analysis, test-python, test-rust-core, test-gpu-linux, benchmark-regression]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, 'skip release')
    runs-on: ubuntu-latest
    outputs:
      publish_pypi: ${{ steps.publish_check.outputs.publish_pypi }}
      release_version: ${{ steps.publish_check.outputs.release_version }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine PyPI Publish Need
        id: publish_check
        run: |
          python - << 'PY'
          import json
          import urllib.request
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          publish = "true"
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/tensor-grep/json", timeout=10) as resp:
                  data = json.load(resp)
                  releases = data.get("releases", {})
                  if version in releases:
                      publish = "false"
          except Exception:
              # On transient network or PyPI API issues, prefer a safe publish attempt.
              publish = "true"

          out = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as f:
              f.write(f"publish_pypi={publish}\n")
              f.write(f"release_version={version}\n")
          print(f"release_version={version}")
          print(f"publish_pypi={publish}")
          PY

  build-wheels-pypi:
    name: build-pypi-wheels (${{ matrix.os }})
    needs: release
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.release_version }}
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels-${{ matrix.os }}
          path: dist

  build-sdist-pypi:
    name: build-pypi-sdist
    needs: release
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.release_version }}
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: pypi-sdist
          path: dist

  validate-pypi-artifacts:
    name: validate-pypi-artifacts
    needs: [release, build-wheels-pypi, build-sdist-pypi]
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Validate built PyPI artifact set
        run: |
          python scripts/validate_pypi_artifacts.py \
            --dist-dir dist \
            --version "${{ needs.release.outputs.release_version }}" \
            --require-platforms "linux,macos,windows"
      - name: Smoke-test install from built PyPI artifacts
        run: |
          python scripts/smoke_test_pypi_artifacts.py \
            --dist-dir dist \
            --version "${{ needs.release.outputs.release_version }}" \
            --work-dir .tmp

  publish-pypi:
    name: publish-pypi
    needs: [release, build-wheels-pypi, build-sdist-pypi, validate-pypi-artifacts]
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tensor-grep
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.release_version }}

      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Verify release version parity across tag/assets/PyPI
        run: |
          python scripts/validate_release_version_parity.py \
            --expected-version "${{ needs.release.outputs.release_version }}" \
            --expected-tag "v${{ needs.release.outputs.release_version }}" \
            --skip-package-managers \
            --check-pypi
