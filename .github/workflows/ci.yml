name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "17 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  release-intent:
    name: release-intent
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Validate PR title for semantic release
        run: python scripts/validate_pr_title_semver.py

  repo-hygiene:
    name: repo-hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Repo Hygiene Guard
        run: python scripts/check_repo_hygiene.py

  smoke:
    name: smoke (ubuntu-latest)
    needs: repo-hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Build Rust core
        working-directory: rust_core
        run: cargo build --no-default-features

      - name: Install package
        run: |
          uv venv --python 3.12
          uv pip install -e .

      - name: Smoke-test Python CLI and golden search
        shell: bash
        run: |
          set -euo pipefail
          uv run python -m tensor_grep --version
          uv run python -m tensor_grep search ERROR tests/golden/fixture_data --format rg --sort path > smoke.out
          grep -F "tests/golden/fixture_data/readme.txt:ERROR: do not delete" smoke.out
          grep -F "tests/golden/fixture_data/server_0.log:ERROR database timeout" smoke.out

  release-readiness:
    name: release-readiness
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        run: uv python install 3.12

      - name: Build docs site (strict)
        run: |
          pip install mkdocs-material
          mkdocs build --strict

      - name: Validate release/package asset consistency
        run: uv run python scripts/validate_release_assets.py

  agent-readiness:
    name: agent-readiness
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Dev Dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Run agent-readiness contract gate
        run: |
          uv run python scripts/agent_readiness.py \
            --no-shell-probes \
            --no-wsl-probe \
            --json \
            --output artifacts/agent_readiness_ci.json

  windows-agent-readiness:
    name: windows-agent-readiness
    needs: smoke
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Dev Dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Stage Windows public launcher shims for shell probes
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/stage_windows_ci_launchers.ps1 -RepoRoot $env:GITHUB_WORKSPACE

      - name: Run Windows agent-readiness shell probes
        shell: pwsh
        run: |
          uv run python scripts/agent_readiness.py `
            --only-shell-probes `
            --no-wsl-probe `
            --json `
            --output artifacts/agent_readiness_windows_ci.json

  package-manager-readiness:
    name: package-manager-readiness (${{ matrix.os }})
    needs: smoke
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Homebrew formula syntax
        if: runner.os == 'Linux'
        run: ruby -c scripts/tensor-grep.rb

      - name: Validate winget manifest syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wingetCanValidate = $false
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            $wingetHelp = winget --help
            $wingetCanValidate = $wingetHelp -match "validate"
          } else {
            Write-Warning "winget is unavailable on this runner; using Python release asset validator fallback"
          }

          if ($wingetCanValidate) {
            $wingetOutput = @(winget validate --manifest scripts\oimiragieo.tensor-grep.yaml 2>&1)
            $wingetExitCode = $LASTEXITCODE
            $wingetOutput | ForEach-Object { Write-Host $_ }
            if ($wingetExitCode -ne 0) {
              $wingetOutputText = ($wingetOutput | Out-String)
              $wingetWarningLines = @($wingetOutput | ForEach-Object { "$_" } | Where-Object { $_ -match "Manifest Warning:" })
              $knownSchemaHeaderWarning = (
                $wingetOutputText -match "Manifest validation succeeded with warnings\." -and
                $wingetWarningLines.Count -eq 1 -and
                $wingetWarningLines[0] -match "The schema header URL does not match the expected pattern"
              )
              if ($knownSchemaHeaderWarning) {
                Write-Warning "winget validate reported only the hosted-runner schema-header warning; verifying strict manifest contract with Python validator"
                uv run python scripts/validate_release_assets.py
                if ($LASTEXITCODE -ne 0) {
                  throw "Python release asset validator fallback failed with exit code $LASTEXITCODE"
                }
              } else {
                throw "winget validate failed with exit code $wingetExitCode"
              }
            }
          } else {
            Write-Warning "winget validate is unavailable on this runner; using Python release asset validator fallback"
            uv run python scripts/validate_release_assets.py
            if ($LASTEXITCODE -ne 0) {
              throw "Python release asset validator fallback failed with exit code $LASTEXITCODE"
            }
          }

      - name: Validate package-manager publish bundle source state
        run: uv run python scripts/prepare_package_manager_release.py --check

      - name: Build package-manager publish bundle artifact
        run: uv run python scripts/prepare_package_manager_release.py --output-dir artifacts/package-manager-bundle

      - name: Verify package-manager publish bundle checksums
        run: uv run python scripts/verify_package_manager_bundle_checksums.py --bundle-dir artifacts/package-manager-bundle

      - name: Smoke-test package-manager bundle contracts
        run: uv run python scripts/smoke_test_package_manager_bundle.py --bundle-dir artifacts/package-manager-bundle

      - name: Upload package-manager bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-manager-bundle-${{ matrix.os }}
          path: artifacts/package-manager-bundle/

  static-analysis:
    name: Formatting & Linting
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version
          
      - name: Install uv
        run: python -m pip install uv
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          
      - name: Check Rust Formatting
        working-directory: rust_core
        run: cargo fmt -- --check
        
      - name: Check Rust Clippy
        working-directory: rust_core
        run: cargo clippy -- -D warnings
        
      - name: Install Python Dev Dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
        
      - name: Python Ruff Linter
        run: uv run ruff check .
        
      - name: Python Ruff Formatter
        run: uv run ruff format --check --preview .
        
      - name: Python Mypy Typecheck
        run: uv run mypy src/tensor_grep

  test-python:
    name: test-python (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        run: python -m pip install uv
        
      - name: Setup Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
        
      - name: Install Rust dependencies (for PyO3 fallback)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          rustc --version
          cargo --version
        
      - name: Install Dependencies (Unix with retry)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          uv venv --python ${{ matrix.python-version }}
          for attempt in 1 2 3 4 5; do
            if uv pip install -e ".[dev,ast]"; then
              exit 0
            fi
            echo "Dependency install failed (attempt ${attempt}/5); retrying after backoff..."
            sleep $((attempt * 5))
          done
          echo "Dependency install failed after 5 attempts."
          exit 1

      - name: Install Dependencies (Windows with retry)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          uv venv --python ${{ matrix.python-version }}
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            uv pip install -e ".[dev,ast]"
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Warning "Dependency install failed (attempt $attempt/5); retrying after backoff..."
            Start-Sleep -Seconds (5 * $attempt)
          }
          throw "Dependency install failed after 5 attempts."
          
      - name: Run Pytest
        run: uv run pytest tests -v --tb=short

  test-rust-core:
    name: test-rust-core (${{ matrix.os }}, ${{ matrix.rust_channel }})
    needs: smoke
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust_channel: [stable, nightly]
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Rust ${{ matrix.rust_channel }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          if ! rustup toolchain list | grep -q "^${{ matrix.rust_channel }}"; then
            rustup toolchain install ${{ matrix.rust_channel }} --profile minimal --no-self-update
          fi
          rustup default ${{ matrix.rust_channel }}
          rustc --version
          cargo --version
          
      - name: Setup Python for PyO3 Linker
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          
      - name: Create venv for PyO3
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE\.venv\Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi
        shell: bash
          
      - name: Cargo Test
        working-directory: rust_core
        run: cargo test --verbose --no-default-features

  search-golden-parity:
    name: search-golden-parity (windows-latest)
    needs: smoke
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for PyO3 Linker
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create venv for PyO3
        shell: bash
        run: |
          python -m venv .venv
          echo "$GITHUB_WORKSPACE\.venv\Scripts" >> $GITHUB_PATH

      - name: Run search golden parity test
        working-directory: rust_core
        run: cargo test --test test_search_golden

  native-build-smoke:
    name: native-build-smoke (${{ matrix.os }})
    needs: smoke
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for PyO3 Linker
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create venv for PyO3
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$GITHUB_WORKSPACE\\.venv\\Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Build native release binary
        working-directory: rust_core
        run: cargo build --release --no-default-features

      - name: Smoke-test native release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="rust_core/target/release/tg"
          "$BIN" --version
          "$BIN" --help
          workdir="$(mktemp -d)"
          printf 'ERROR one\nINFO two\n' > "$workdir/sample.log"
          "$BIN" search ERROR "$workdir/sample.log"

      - name: Smoke-test native release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "rust_core\\target\\release\\tg.exe"
          & $bin --version
          & $bin --help
          $workdir = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "tg-native-smoke") -Force
          Set-Content -Path (Join-Path $workdir.FullName "sample.log") -Value "ERROR one`nINFO two"
          & $bin search ERROR (Join-Path $workdir.FullName "sample.log")

  test-gpu-linux:
    name: test-gpu-nvidia (ubuntu-latest, cuDF)
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
        
      - name: Install Rust dependencies (for PyO3 fallback)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          rustc --version
          cargo --version
        
      - name: Verify cuDF / RAPIDS Configuration (with retry)
        run: |
          set -euo pipefail
          uv venv --python 3.12
          for attempt in 1 2 3 4 5; do
            if uv pip install cudf-cu12 kvikio-cu12 --extra-index-url https://pypi.nvidia.com && \
              uv pip install -e ".[dev,nlp,ast]"; then
              exit 0
            fi
            echo "GPU dependency install failed (attempt ${attempt}/5); retrying after backoff..."
            sleep $((attempt * 10))
          done
          echo "GPU dependency install failed after 5 attempts."
          exit 1
          
      # Since standard GitHub Action runners don't have physical GPUs,
      # we run pytest but rely on our test suites dynamic `@pytest.mark.skipif`
      # to successfully parse the fallback architecture cleanly without crashing.
      - name: Run Pytest with GPU Hooks
        run: uv run pytest tests -v -m "not slow"

  benchmark-regression:
    name: benchmark-regression (ubuntu-latest)
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        run: uv python install 3.12

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install benchmark dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[bench,dev]"

      - name: Build benchmark native binary
        working-directory: rust_core
        run: cargo build --release --no-default-features

      - name: Determine benchmark base revision
        if: github.event_name != 'schedule'
        id: benchmark-base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout base revision for same-runner benchmark comparison
        if: github.event_name != 'schedule'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.benchmark-base.outputs.base_sha }}
          path: base-revision
          fetch-depth: 0

      - name: Install base benchmark dependencies
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          cd base-revision
          uv venv --python 3.12
          uv pip install -e ".[bench,dev]"

      - name: Build base benchmark native binary
        if: github.event_name != 'schedule'
        working-directory: base-revision/rust_core
        run: cargo build --release --no-default-features

      - name: Run core benchmark suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          uv run python benchmarks/run_benchmarks.py \
            --output artifacts/bench_run_benchmarks.head.json \
            | tee artifacts/bench_run_benchmarks.head.txt

      - name: Run base benchmark suite
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p base-revision/artifacts
          (
            cd base-revision
            uv run python benchmarks/run_benchmarks.py \
              --output artifacts/bench_run_benchmarks.base.json
          ) | tee base-revision/artifacts/bench_run_benchmarks.base.txt

      - name: Run hot-query benchmark suite
        shell: bash
        run: |
          set -euo pipefail
          uv run python benchmarks/run_hot_query_benchmarks.py \
            --output artifacts/bench_hot_query_benchmarks.head.json \
            | tee artifacts/bench_hot_query_benchmarks.txt

      - name: Run base hot-query benchmark suite
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p base-revision/artifacts
          (
            cd base-revision
            uv run python benchmarks/run_hot_query_benchmarks.py \
              --output artifacts/bench_hot_query_benchmarks.base.json
          ) | tee base-revision/artifacts/bench_hot_query_benchmarks.base.txt

      - name: Enforce hot-query benchmark regression gate
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          current = json.loads(
              Path("artifacts/bench_hot_query_benchmarks.head.json").read_text(encoding="utf-8")
          )
          baseline = json.loads(
              Path("base-revision/artifacts/bench_hot_query_benchmarks.base.json").read_text(
                  encoding="utf-8"
              )
          )
          if not current.get("no_regressions", False):
              raise SystemExit("current hot-query benchmark reported regressions")
          if not baseline.get("no_regressions", False):
              raise SystemExit("baseline hot-query benchmark reported regressions")
          PY

      - name: Run agent workflow benchmark suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          uv run python benchmarks/run_agent_workflow_benchmarks.py \
            --iterations 1 \
            --files 50 \
            --loc 2500 \
            --output artifacts/bench_agent_workflow.head.json \
            | tee artifacts/bench_agent_workflow.head.txt

      - name: Run base agent workflow benchmark suite
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p base-revision/artifacts
          (
            cd base-revision
            TENSOR_GREP_AGENT_WORKFLOW_BENCH_DIR="$PWD/artifacts/bench_agent_workflow" \
            uv run python ../benchmarks/run_agent_workflow_benchmarks.py \
              --binary rust_core/target/release/tg \
              --iterations 1 \
              --files 50 \
              --loc 2500 \
              --output artifacts/bench_agent_workflow.base.json
          ) | tee base-revision/artifacts/bench_agent_workflow.base.txt

      - name: Run agent success harness suite
        shell: bash
        run: |
          set -euo pipefail
          uv run python benchmarks/run_agent_success_harness.py \
            --iterations 1 \
            --output artifacts/bench_agent_success_harness.head.json \
            | tee artifacts/bench_agent_success_harness.head.txt

      - name: Run base agent success harness suite
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p base-revision/artifacts
          (
            cd base-revision
            uv run python benchmarks/run_agent_success_harness.py \
              --iterations 1 \
              --output artifacts/bench_agent_success_harness.base.json
          ) | tee base-revision/artifacts/bench_agent_success_harness.base.txt

      - name: Enforce agent workflow benchmark regression gate
        if: github.event_name != 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path


          def _load(path: str) -> dict:
              return json.loads(Path(path).read_text(encoding="utf-8"))


          def _workflow_passed(payload: dict) -> bool:
              return bool(payload.get("all_passed", payload.get("passed", False)))


          def _success_passed(payload: dict) -> bool:
              summary = payload.get("summary")
              return isinstance(summary, dict) and bool(summary.get("all_passed"))


          current_workflow = _load("artifacts/bench_agent_workflow.head.json")
          baseline_workflow = _load("base-revision/artifacts/bench_agent_workflow.base.json")
          current_success = _load("artifacts/bench_agent_success_harness.head.json")
          baseline_success = _load("base-revision/artifacts/bench_agent_success_harness.base.json")

          if not _workflow_passed(current_workflow):
              raise SystemExit("current agent workflow benchmark reported contract failures")
          if not _workflow_passed(baseline_workflow):
              raise SystemExit("baseline agent workflow benchmark reported contract failures")
          if not _success_passed(current_success):
              raise SystemExit("current agent success harness reported contract failures")
          if not _success_passed(baseline_success):
              raise SystemExit("baseline agent success harness reported contract failures")
          PY

      - name: Enforce benchmark regression gate
        if: github.event_name != 'schedule'
        run: |
          uv run python benchmarks/check_regression.py \
            --baseline base-revision/artifacts/bench_run_benchmarks.base.json \
            --current artifacts/bench_run_benchmarks.head.json \
            --max-regression-pct 20.0 \
            --min-baseline-time-s 0.2

      - name: Report accepted benchmark baseline drift
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          uv run python benchmarks/check_regression.py \
            --baseline auto \
            --current artifacts/bench_run_benchmarks.head.json \
            --max-regression-pct 20.0 \
            --min-baseline-time-s 0.2 \
            | tee artifacts/bench_run_benchmarks.accepted_drift.txt

      - name: Build benchmark markdown summary
        shell: bash
        run: |
          set -euo pipefail
          uv run python benchmarks/summarize_benchmarks.py \
            --baseline auto \
            --current artifacts/bench_run_benchmarks.head.json \
            --max-regression-pct 20.0 \
            --min-baseline-time-s 0.2 \
            --output artifacts/benchmark_summary.md
          {
            echo "## Same-runner benchmark gate"
            echo ""
            if [ "${{ github.event_name }}" = "schedule" ]; then
              echo "Scheduled runs skip the base-vs-head blocking comparison."
            else
              echo "Blocking comparison uses:"
              echo "- baseline: \`base-revision/artifacts/bench_run_benchmarks.base.json\`"
              echo "- current: \`artifacts/bench_run_benchmarks.head.json\`"
            fi
            echo ""
            echo "## Accepted baseline drift report"
            echo ""
            if [ -f artifacts/bench_run_benchmarks.accepted_drift.txt ]; then
              cat artifacts/bench_run_benchmarks.accepted_drift.txt
            else
              echo "No accepted-baseline drift output was captured."
            fi
            echo ""
            cat artifacts/benchmark_summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-artifacts-ci
          path: |
            artifacts/
            base-revision/artifacts/

  release:
    name: Semantic Release
    needs: [smoke, release-readiness, agent-readiness, windows-agent-readiness, package-manager-readiness, static-analysis, test-python, test-rust-core, search-golden-parity, native-build-smoke, test-gpu-linux, benchmark-regression]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, 'skip release')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.publish_check.outputs.released }}
      publish_pypi: ${{ steps.publish_check.outputs.publish_pypi }}
      release_version: ${{ steps.publish_check.outputs.release_version }}
      release_tag: ${{ steps.publish_check.outputs.release_tag }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine PyPI Publish Need
        id: publish_check
        env:
          SEMANTIC_RELEASED: ${{ steps.release.outputs.released }}
          SEMANTIC_RELEASE_VERSION: ${{ steps.release.outputs.version }}
          SEMANTIC_RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          python - << 'PY'
          import json
          import os
          import urllib.request
          import tomllib
          from pathlib import Path

          released = os.environ.get("SEMANTIC_RELEASED", "").lower() == "true"
          version = os.environ.get("SEMANTIC_RELEASE_VERSION", "").strip()
          tag = os.environ.get("SEMANTIC_RELEASE_TAG", "").strip()
          publish = "false"
          if released:
              if not version:
                  version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
              if not tag:
                  tag = f"v{version}"
              publish = "true"
              try:
                  with urllib.request.urlopen("https://pypi.org/pypi/tensor-grep/json", timeout=10) as resp:
                      data = json.load(resp)
                      releases = data.get("releases", {})
                      if version in releases:
                          publish = "false"
              except Exception:
                  # On transient network or PyPI API issues, prefer a safe publish attempt
                  # after semantic-release has actually produced a new version.
                  publish = "true"
          else:
              version = ""
              tag = ""

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as f:
              f.write(f"released={'true' if released else 'false'}\n")
              f.write(f"publish_pypi={publish}\n")
              f.write(f"release_version={version}\n")
              f.write(f"release_tag={tag}\n")
          print(f"released={released}")
          print(f"publish_pypi={publish}")
          print(f"release_version={version}")
          print(f"release_tag={tag}")
          PY

  build-wheels-pypi:
    name: build-pypi-wheels (${{ matrix.os }})
    needs: release
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.release_version }}
      - name: Prefetch Rust dependencies for PyPI artifacts
        shell: bash
        env:
          CARGO_HTTP_TIMEOUT: "60"
          CARGO_NET_RETRY: "10"
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if cargo fetch --manifest-path rust_core/Cargo.toml; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "Cargo dependency prefetch failed on attempt ${attempt}/5; retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Cargo dependency prefetch failed after 5 attempts."
          cargo fetch --manifest-path rust_core/Cargo.toml
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
        env:
          CARGO_HTTP_TIMEOUT: "60"
          CARGO_NET_RETRY: "10"
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: pypi-wheels-${{ matrix.os }}
          path: dist

  build-sdist-pypi:
    name: build-pypi-sdist
    needs: release
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.release_version }}
      - name: Prefetch Rust dependencies for PyPI artifacts
        shell: bash
        env:
          CARGO_HTTP_TIMEOUT: "60"
          CARGO_NET_RETRY: "10"
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if cargo fetch --manifest-path rust_core/Cargo.toml; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "Cargo dependency prefetch failed on attempt ${attempt}/5; retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Cargo dependency prefetch failed after 5 attempts."
          cargo fetch --manifest-path rust_core/Cargo.toml
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
        env:
          CARGO_HTTP_TIMEOUT: "60"
          CARGO_NET_RETRY: "10"
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: pypi-sdist
          path: dist

  validate-pypi-artifacts:
    name: validate-pypi-artifacts
    needs: [release, build-wheels-pypi, build-sdist-pypi]
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Download all distributions
        uses: actions/download-artifact@v8
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Validate built PyPI artifact set
        run: |
          python scripts/validate_pypi_artifacts.py \
            --dist-dir dist \
            --version "${{ needs.release.outputs.release_version }}" \
            --require-platforms "linux,macos,windows"
      - name: Smoke-test install from built PyPI artifacts
        run: |
          python scripts/smoke_test_pypi_artifacts.py \
            --dist-dir dist \
            --version "${{ needs.release.outputs.release_version }}" \
            --work-dir .tmp

  build-release-native-assets:
    name: build-release-native-assets (${{ matrix.os }}, ${{ matrix.acceleration }})
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      RELEASE_NATIVE_ASSET_PROFILE: ${{ vars.TENSOR_GREP_RELEASE_NATIVE_ASSET_PROFILE || 'native-frontdoor' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            acceleration: cpu
            cargo_args: --no-default-features
            asset_name: tg-linux-amd64-cpu
          - os: ubuntu-latest
            acceleration: nvidia
            cargo_args: --features cuda
            asset_name: tg-linux-amd64-nvidia
          - os: windows-latest
            acceleration: cpu
            cargo_args: --no-default-features
            asset_name: tg-windows-amd64-cpu.exe
          - os: windows-latest
            acceleration: nvidia
            cargo_args: --features cuda
            asset_name: tg-windows-amd64-nvidia.exe
          - os: macos-15-intel
            acceleration: cpu
            cargo_args: --no-default-features
            asset_name: tg-macos-amd64-cpu
    steps:
      - uses: actions/checkout@v6
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        with:
          ref: v${{ needs.release.outputs.release_version }}

      - name: Setup Rust stable
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for PyO3 Linker
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create venv for PyO3
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$GITHUB_WORKSPACE\\.venv\\Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Build native release front door
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        working-directory: rust_core
        run: cargo build --release ${{ matrix.cargo_args }}

      - name: Package native release front door
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
          NATIVE_ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -euo pipefail
          mkdir -p dist-native
          if [ "$RUNNER_OS" = "Windows" ]; then
            src="rust_core/target/release/tg.exe"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            src="rust_core/target/release/tg"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            src="rust_core/target/release/tg"
          else
            echo "Unsupported runner OS: $RUNNER_OS"
            exit 1
          fi
          dest="dist-native/${NATIVE_ASSET_NAME}"
          cp "$src" "$dest"
          chmod +x "$dest" || true
          "$src" --version | tee version.txt
          grep -Fx "tg ${RELEASE_VERSION}" version.txt
          "$src" --help >/dev/null

      - name: Upload native release front door
        if: matrix.acceleration == 'cpu' || env.RELEASE_NATIVE_ASSET_PROFILE == 'native-frontdoor-gpu'
        uses: actions/upload-artifact@v7
        with:
          name: release-native-${{ matrix.os }}-${{ matrix.acceleration }}
          path: dist-native/

  publish-github-release-assets:
    name: publish-github-release-assets
    needs: [release, build-release-native-assets]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.release_version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Setup Python
        run: uv python install 3.12

      - name: Download native release front doors
        uses: actions/download-artifact@v8
        with:
          pattern: release-native-*
          path: artifacts/native

      - name: Validate native release asset matrix and generate checksums
        env:
          RELEASE_NATIVE_ASSET_PROFILE: ${{ vars.TENSOR_GREP_RELEASE_NATIVE_ASSET_PROFILE || 'native-frontdoor' }}
        run: |
          uv run python scripts/validate_release_binary_artifacts.py \
            --artifacts-dir artifacts/native \
            --checksums-out artifacts/CHECKSUMS.txt \
            --expected-profile "$RELEASE_NATIVE_ASSET_PROFILE"

      - name: Build package-manager publish bundle
        run: |
          uv run python scripts/prepare_package_manager_release.py \
            --output-dir artifacts/package-manager-bundle \
            --release-checksums artifacts/CHECKSUMS.txt

      - name: Verify package-manager bundle checksums
        run: |
          uv run python scripts/verify_package_manager_bundle_checksums.py \
            --bundle-dir artifacts/package-manager-bundle

      - name: Smoke-test package-manager bundle contracts
        run: |
          uv run python scripts/smoke_test_package_manager_bundle.py \
            --bundle-dir artifacts/package-manager-bundle \
            --expected-version "${{ needs.release.outputs.release_version }}"

      - name: Upload GitHub release native assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.release.outputs.release_version }}
          fail_on_unmatched_files: true
          files: |
            artifacts/native/**/tg-*
            artifacts/CHECKSUMS.txt
            artifacts/package-manager-bundle/homebrew-tap/Formula/tensor-grep.rb
            artifacts/package-manager-bundle/winget-pkgs/manifests/o/oimiragieo/tensor-grep/${{ needs.release.outputs.release_version }}/oimiragieo.tensor-grep.yaml
            artifacts/package-manager-bundle/PUBLISH_INSTRUCTIONS.md
            artifacts/package-manager-bundle/BUNDLE_CHECKSUMS.txt

      - name: Verify GitHub release native asset coverage
        env:
          RELEASE_NATIVE_ASSET_PROFILE: ${{ vars.TENSOR_GREP_RELEASE_NATIVE_ASSET_PROFILE || 'native-frontdoor' }}
        run: |
          uv run python scripts/verify_github_release_assets.py \
            --repo "${{ github.repository }}" \
            --tag "v${{ needs.release.outputs.release_version }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --expected-profile "$RELEASE_NATIVE_ASSET_PROFILE" \
            --wait-seconds 120 \
            --poll-interval-seconds 5

  publish-pypi:
    name: publish-pypi
    needs: [release, build-wheels-pypi, build-sdist-pypi, validate-pypi-artifacts, publish-github-release-assets]
    if: needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tensor-grep
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.release_version }}

      - name: Download all distributions
        uses: actions/download-artifact@v8
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Verify release version parity across tag/assets/PyPI
        run: |
          python scripts/validate_release_version_parity.py \
            --expected-version "${{ needs.release.outputs.release_version }}" \
            --expected-tag "v${{ needs.release.outputs.release_version }}" \
            --dist-dir dist \
            --check-pypi \
            --pypi-wait-seconds 180 \
            --pypi-poll-interval-seconds 10

  publish-success-gate:
    name: publish-success-gate
    needs: [release, publish-pypi, publish-github-release-assets]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip publish parity gate when semantic-release produced no version
        if: needs.release.outputs.released != 'true'
        run: |
          echo "No semantic-release release for this commit; skipping publish parity gate."

      - uses: actions/checkout@v6
        if: needs.release.outputs.released == 'true'
        with:
          ref: v${{ needs.release.outputs.release_version }}

      - name: Download all distributions
        if: needs.release.outputs.released == 'true' && needs.release.outputs.publish_pypi == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true

      - name: Confirm publish job result when publishing is required
        if: needs.release.outputs.released == 'true'
        run: |
          if [ "${{ needs.release.result }}" != "success" ]; then
            echo "release job did not succeed."
            exit 1
          fi
          if [ "${{ needs.release.outputs.publish_pypi }}" != "true" ]; then
            echo "publish_pypi=false, skipping publish-pypi job result check."
            exit 0
          fi
          if [ "${{ needs.publish-pypi.result }}" != "success" ]; then
            echo "publish-pypi job did not succeed."
            exit 1
          fi
          echo "publish-pypi job succeeded."

      - name: Confirm GitHub release asset job result when publishing is required
        if: needs.release.outputs.released == 'true'
        run: |
          if [ "${{ needs.publish-github-release-assets.result }}" != "success" ]; then
            echo "publish-github-release-assets job did not succeed."
            exit 1
          fi
          echo "publish-github-release-assets job succeeded."

      - name: Verify GitHub release native assets for semantic-release version
        if: needs.release.outputs.released == 'true'
        env:
          RELEASE_NATIVE_ASSET_PROFILE: ${{ vars.TENSOR_GREP_RELEASE_NATIVE_ASSET_PROFILE || 'native-frontdoor' }}
        run: |
          python scripts/verify_github_release_assets.py \
            --repo "${{ github.repository }}" \
            --tag "v${{ needs.release.outputs.release_version }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --expected-profile "$RELEASE_NATIVE_ASSET_PROFILE" \
            --wait-seconds 120 \
            --poll-interval-seconds 5

      - name: Verify PyPI parity for semantic-release version (always)
        if: needs.release.outputs.released == 'true'
        run: |
          PARITY_ARGS=(
            --expected-version "${{ needs.release.outputs.release_version }}"
            --expected-tag "v${{ needs.release.outputs.release_version }}"
            --check-pypi
            --pypi-wait-seconds 180
            --pypi-poll-interval-seconds 10
          )
          if [ "${{ needs.release.outputs.publish_pypi }}" = "true" ]; then
            PARITY_ARGS+=(--dist-dir dist)
          fi
          python scripts/validate_release_version_parity.py "${PARITY_ARGS[@]}"

  release-tag-smoke:
    name: release-tag-smoke
    needs: [release, publish-success-gate]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.release_version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Dev Dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Validate stamped release assets on release tag
        run: uv run python scripts/validate_release_assets.py

      - name: Run release-tag contract smoke
        run: |
          uv run python scripts/agent_readiness.py \
            --no-shell-probes \
            --no-wsl-probe \
            --json \
            --output artifacts/agent_readiness_release_tag.json
