name: Dependabot Automation

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot-triage:
    name: dependabot-triage
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure dependency labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create dependencies --repo "$GH_REPO" --color 0366d6 --description "Dependency maintenance" --force
          gh label create "bot:dependabot" --repo "$GH_REPO" --color 5319e7 --description "Automated Dependabot pull request" --force
          gh label create "supply-chain" --repo "$GH_REPO" --color 1d76db --description "Supply-chain maintenance workflow" --force
          gh label create "python" --repo "$GH_REPO" --color 0e8a16 --description "Python dependency update" --force
          gh label create "rust" --repo "$GH_REPO" --color b60205 --description "Rust dependency update" --force
          gh label create "npm" --repo "$GH_REPO" --color fbca04 --description "npm dependency update" --force
          gh label create "github-actions" --repo "$GH_REPO" --color 5319e7 --description "GitHub Actions dependency update" --force
          gh label create "deps:production" --repo "$GH_REPO" --color b60205 --description "Direct production dependency update" --force
          gh label create "deps:development" --repo "$GH_REPO" --color 0e8a16 --description "Development dependency update" --force
          gh label create "deps:indirect" --repo "$GH_REPO" --color c2e0c6 --description "Indirect dependency update" --force
          gh label create "deps:major" --repo "$GH_REPO" --color b60205 --description "Semver-major dependency update" --force
          gh label create "deps:minor" --repo "$GH_REPO" --color fbca04 --description "Semver-minor dependency update" --force
          gh label create "deps:patch" --repo "$GH_REPO" --color 0e8a16 --description "Semver-patch dependency update" --force
          gh label create "automerge:eligible" --repo "$GH_REPO" --color 0e8a16 --description "Safe dependency update eligible for auto-merge" --force
          gh label create "manual-review" --repo "$GH_REPO" --color d93f0b --description "Dependency update requires human review" --force

      - name: Apply dependency labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "dependencies" --add-label "bot:dependabot" --add-label "supply-chain"

          case "$PACKAGE_ECOSYSTEM" in
            uv) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "python" ;;
            cargo) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "rust" ;;
            npm) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "npm" ;;
            github-actions) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "github-actions" ;;
          esac

          case "$DEPENDENCY_TYPE" in
            direct:production) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "deps:production" ;;
            direct:development) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "deps:development" ;;
            indirect) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "deps:indirect" ;;
          esac

          case "$UPDATE_TYPE" in
            version-update:semver-major) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "deps:major" ;;
            version-update:semver-minor) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "deps:minor" ;;
            version-update:semver-patch) gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "deps:patch" ;;
          esac

      - name: Determine automerge policy
        id: policy
        env:
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        shell: bash
        run: |
          set -euo pipefail

          safe="false"
          reason="manual-review"

          if [[ "$PACKAGE_ECOSYSTEM" == "github-actions" && "$UPDATE_TYPE" =~ ^version-update:semver-(minor|patch)$ ]]; then
            safe="true"
            reason="github-actions-safe"
          elif [[ ( "$PACKAGE_ECOSYSTEM" == "uv" || "$PACKAGE_ECOSYSTEM" == "cargo" || "$PACKAGE_ECOSYSTEM" == "npm" ) \
               && ( "$DEPENDENCY_TYPE" == "direct:development" || "$DEPENDENCY_TYPE" == "indirect" ) \
               && "$UPDATE_TYPE" =~ ^version-update:semver-(minor|patch)$ ]]; then
            safe="true"
            reason="non-production-safe"
          fi

          echo "safe=$safe" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Mark safe updates
        if: steps.policy.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "automerge:eligible"

      - name: Mark manual review updates
        if: steps.policy.outputs.safe != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --repo "$GH_REPO" --add-label "manual-review"

      - name: Approve safe updates
        if: steps.policy.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --repo "$GH_REPO" --approve --body "Auto-approved safe Dependabot update." || true

      - name: Enable auto-merge for safe updates
        if: steps.policy.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        shell: bash
        run: |
          set -euo pipefail
          if gh pr merge --repo "$GH_REPO" --auto --squash "$PR_URL"; then
            echo "Enabled auto-merge for $PR_URL"
          else
            echo "Unable to enable auto-merge for $PR_URL. Check repository auto-merge settings."
          fi
