name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  validate-release-assets:
    name: Validate Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Python
        run: uv python install 3.12
      - name: Validate release/package asset consistency
        run: uv run python scripts/validate_release_assets.py

  validate-package-managers:
    name: Validate Package Managers (${{ matrix.os }})
    needs: validate-release-assets
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate Homebrew formula syntax
        if: runner.os == 'Linux'
        run: ruby -c scripts/tensor-grep.rb

      - name: Validate winget manifest syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Warning "winget not found; falling back to python validator"
            uv python install 3.12
            uv run python scripts/validate_release_assets.py
            exit 0
          }

          $wingetHelp = winget --help
          if ($wingetHelp -notmatch "validate") {
            Write-Warning "winget validate is unavailable in this runner version; falling back to python validator"
            uv python install 3.12
            uv run python scripts/validate_release_assets.py
            exit 0
          }

          winget validate --manifest scripts\oimiragieo.tensor-grep.yaml
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "winget validate failed with exit code $LASTEXITCODE; falling back to python validator"
            uv python install 3.12
            uv run python scripts/validate_release_assets.py
          }

      - name: Validate package-manager publish bundle source state
        run: |
          uv python install 3.12
          uv run python scripts/prepare_package_manager_release.py --check

  build-binaries:
    needs: [validate-release-assets, validate-package-managers]
    name: Build on ${{ matrix.os }} - ${{ matrix.gpu }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        gpu: [cpu, nvidia]
        include:
          - os: macos-latest
            gpu: cpu
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12
          
      - name: Install dependencies (CPU)
        if: matrix.gpu == 'cpu'
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install nuitka
          
      - name: Install dependencies (NVIDIA)
        if: matrix.gpu == 'nvidia'
        run: |
          uv venv
          uv pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
          uv pip install -e ".[gpu-win,nlp,ast,dev]"
          uv pip install nuitka
          
      - name: Build Binary
        run: uv run python scripts/build_binaries.py
        
      - name: Rename Artifact (Windows)
        if: runner.os == 'Windows'
        run: mv tg.exe tg-windows-amd64-${{ matrix.gpu }}.exe
        
      - name: Rename Artifact (Linux)
        if: runner.os == 'Linux'
        run: mv tg tg-linux-amd64-${{ matrix.gpu }}
        
      - name: Rename Artifact (macOS)
        if: runner.os == 'macOS'
        run: mv tg tg-macos-amd64-${{ matrix.gpu }}

      - name: Smoke-test Binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\tg-windows-amd64-${{ matrix.gpu }}.exe --version

      - name: Smoke-test Binary (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x tg-linux-amd64-${{ matrix.gpu }}
          ./tg-linux-amd64-${{ matrix.gpu }} --version

      - name: Smoke-test Binary (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x tg-macos-amd64-${{ matrix.gpu }}
          ./tg-macos-amd64-${{ matrix.gpu }} --version
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}-${{ matrix.gpu }}
          path: tg-*

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Validate release binary artifact matrix and generate checksums
        run: |
          uv run python scripts/validate_release_binary_artifacts.py \
            --artifacts-dir artifacts \
            --checksums-out artifacts/CHECKSUMS.txt

      - name: Build package-manager publish bundle
        run: |
          uv run python scripts/prepare_package_manager_release.py \
            --output-dir artifacts/package-manager-bundle

      - name: Verify package-manager bundle checksums
        run: |
          uv run python scripts/verify_package_manager_bundle_checksums.py \
            --bundle-dir artifacts/package-manager-bundle

      - name: Smoke-verify Linux release binary version
        run: |
          uv run python scripts/smoke_verify_release_binary.py \
            --artifacts-dir artifacts \
            --expected-version "${GITHUB_REF#refs/tags/v}"
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/tg-*
            artifacts/CHECKSUMS.txt
            artifacts/package-manager-bundle/**
          generate_release_notes: true

  verify-release-assets:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify uploaded release assets and checksum coverage
        run: |
          python scripts/verify_github_release_assets.py \
            --repo "${{ github.repository }}" \
            --tag "${GITHUB_REF#refs/tags/}" \
            --token "${{ secrets.GITHUB_TOKEN }}"

  validate-tag-version-parity:
    needs: verify-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Validate release tag/version parity across package metadata
        run: |
          python scripts/validate_release_version_parity.py \
            --expected-version "${GITHUB_REF#refs/tags/v}" \
            --expected-tag "${GITHUB_REF#refs/tags/}"

  publish-npm:
    needs: validate-tag-version-parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify Version Match
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          NPM_VERSION=$(node -p "require('./npm/package.json').version")
          if [ "$TAG_VERSION" != "$NPM_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match npm version ($NPM_VERSION)"
            exit 1
          fi
          
      - name: Publish NPM Package
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Verify npm registry parity for release version
        run: |
          python scripts/validate_release_version_parity.py \
            --expected-version "${GITHUB_REF#refs/tags/v}" \
            --expected-tag "${GITHUB_REF#refs/tags/}" \
            --check-npm \
            --npm-wait-seconds 180 \
            --npm-poll-interval-seconds 10

  publish-docs:
    needs: validate-tag-version-parity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install mkdocs
        run: pip install mkdocs-material
        
      - name: Deploy Docs
        run: mkdocs gh-deploy --force

  release-success-gate:
    needs: [validate-tag-version-parity, publish-npm, publish-docs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Verify final npm parity before release success gate
        run: |
          python scripts/validate_release_version_parity.py \
            --expected-version "${GITHUB_REF#refs/tags/v}" \
            --expected-tag "${GITHUB_REF#refs/tags/}" \
            --check-npm \
            --npm-wait-seconds 180 \
            --npm-poll-interval-seconds 10

      - name: Verify final PyPI parity before release success gate
        run: |
          python scripts/validate_release_version_parity.py \
            --expected-version "${GITHUB_REF#refs/tags/v}" \
            --expected-tag "${GITHUB_REF#refs/tags/}" \
            --check-pypi \
            --pypi-wait-seconds 180 \
            --pypi-poll-interval-seconds 10

      - name: Confirm release publication gates
        run: |
          echo "Release publication gates passed: parity, npm, docs."
