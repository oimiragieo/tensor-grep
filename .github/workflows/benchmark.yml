name: Benchmarks
on:
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run optional GPU/NLP benchmark suite"
        required: false
        default: "false"
  schedule:
    - cron: "0 6 * * 1"
jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Install benchmark dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,ast]"
      - name: Run benchmark suites
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          uv run python benchmarks/run_benchmarks.py | tee artifacts/bench_run_benchmarks.txt
          uv run python benchmarks/run_ast_benchmarks.py | tee artifacts/bench_run_ast_benchmarks.txt
      - name: Run optional GPU benchmark suite
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu == 'true' }}
        shell: bash
        run: |
          set -o pipefail
          uv pip install -e ".[bench,nlp]"
          uv run python benchmarks/run_gpu_benchmarks.py | tee artifacts/bench_run_gpu_benchmarks.txt
      - name: Optional regression check against OS baseline
        shell: bash
        run: |
          os="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          baseline="benchmarks/baselines/run_benchmarks.${os}.json"
          if [ -f "$baseline" ]; then
            uv run python benchmarks/check_regression.py \
              --baseline "$baseline" \
              --current artifacts/bench_run_benchmarks.json \
              --max-regression-pct 20.0 \
              --min-baseline-time-s 0.2
          else
            echo "No baseline file found for ${RUNNER_OS}, skipping regression gate."
          fi
      - name: Build benchmark markdown summary
        shell: bash
        run: |
          uv run python benchmarks/summarize_benchmarks.py \
            --baseline benchmarks/baselines/run_benchmarks.ubuntu.json \
            --current artifacts/bench_run_benchmarks.json \
            --max-regression-pct 20.0 \
            --min-baseline-time-s 0.2 \
            --output artifacts/benchmark_summary.md
          cat artifacts/benchmark_summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Throughput smoke benchmark
        run: uv run pytest tests/e2e/test_throughput.py -v --tb=short
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-artifacts
          path: artifacts/
