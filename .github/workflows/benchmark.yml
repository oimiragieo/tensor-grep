name: Benchmarks
on:
  pull_request:
    paths: ["src/**", "tests/**", "benchmarks/**", ".github/workflows/benchmark.yml"]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install benchmark dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,bench,ast]"
      - name: Run benchmark suites
        run: |
          mkdir -p artifacts
          uv run python benchmarks/run_benchmarks.py | tee artifacts/bench_run_benchmarks.txt
          uv run python benchmarks/run_ast_benchmarks.py | tee artifacts/bench_run_ast_benchmarks.txt
          uv run python benchmarks/run_gpu_benchmarks.py | tee artifacts/bench_run_gpu_benchmarks.txt
      - name: Optional regression check against OS baseline
        shell: bash
        run: |
          os="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          baseline="benchmarks/baselines/run_benchmarks.${os}.json"
          if [ -f "$baseline" ]; then
            uv run python benchmarks/check_regression.py \
              --baseline "$baseline" \
              --current artifacts/bench_run_benchmarks.json \
              --max-regression-pct 15.0
          else
            echo "No baseline file found for ${RUNNER_OS}, skipping regression gate."
          fi
      - name: Throughput smoke benchmark
        run: uv run pytest tests/e2e/test_throughput.py -v --tb=short
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: artifacts/
