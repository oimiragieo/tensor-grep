site_name: tensor-grep
site_description: Native search and rewrite tool for large text corpora and codebases
site_author: tensor-grep team
repo_url: https://github.com/oimiragieo/tensor-grep
repo_name: oimiragieo/tensor-grep

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Support Matrix: SUPPORT_MATRIX.md
    - Contracts: CONTRACTS.md
    - Experimental Features: EXPERIMENTAL.md
    - Release Checklist: RELEASE_CHECKLIST.md
    - Hotfix Procedure: HOTFIX_PROCEDURE.md
    - Package Manager Publish: package_manager_publish.md
  - Architecture: architecture.md
  - Benchmarks: benchmarks.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
